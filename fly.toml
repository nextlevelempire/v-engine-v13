# Fly.io deployment example for the V-Engine v0.3 standalone runtime.
# Run `fly launch` once to generate the app + this file is the post-launch
# config. Then `fly deploy` to ship.

app = "v-engine"            # change to your Fly app name
primary_region = "iad"      # pick the region closest to your users
kill_signal = "SIGINT"
kill_timeout = "30s"

[build]
  dockerfile = "Dockerfile"

[env]
  # Server binds to all interfaces inside the container.
  OMNI_LISTEN_HOST = "0.0.0.0"
  OMNI_PORT = "4011"
  # Fly gives us a private /data volume for browser state.
  OMNI_HOME = "/data"
  NODE_ENV = "production"
  # K8s-style probes live on the same port. Fly's healthcheck uses /livez.
  OMNI_LOG_LEVEL = "info"
  OMNI_METRICS_DISABLED = "0"
  # Sensible production defaults — override per-environment via `fly secrets`.
  OMNI_MAX_PARALLEL_SESSIONS = "50"
  OMNI_BODY_SIZE_LIMIT = "10485760"
  OMNI_REQUEST_TIMEOUT_MS = "60000"
  OMNI_AUTH_FAIL_LIMIT = "10"
  OMNI_AUTH_FAIL_WINDOW_MS = "60000"
  OMNI_ACTION_LOG_MAX = "10000"
  OMNI_IDLE_TIMEOUT_MS = "900000"
  OMNI_TENANT_SCOPING = "off"

[[services]]
  protocol = "tcp"
  internal_port = 4011
  processes = ["app"]

  [[services.ports]]
    port = 80
    handlers = ["http"]
    force_https = true

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]

  [services.concurrency]
    type = "connections"
    hard_limit = 100
    soft_limit = 80

  [[services.tcp_checks]]
    interval = "15s"
    timeout = "2s"
    grace_period = "10s"

  [[services.http_checks]]
    interval = "30s"
    timeout = "3s"
    grace_period = "10s"
    method = "get"
    path = "/livez"

[mounts]
  source = "v_engine_data"
  destination = "/data"

# Auto-stop machines when idle to save cost. Use `fly machine wake` to start.
[[vm]]
  size = "performance-1x"
  memory = "2gb"
  cpus = 1

[deploy]
  release_command = "node dist/src/cli.js --version"   # smoke the release
  strategy = "rolling"
